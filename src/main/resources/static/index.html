<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --card: #f8f9ff;
      --border: #e0e4f0;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #22c55e;
      --text: #1a1a2e;
      --muted: #8890a4;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(108,99,255,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-card .num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Search bar */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .search-row input {
      flex: 1;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-danger {
      background: rgba(255, 101, 132, 0.15);
      color: var(--accent2);
      border: 1px solid rgba(255,101,132,0.2);
      padding: 6px 14px;
      font-size: 12px;
    }

    .btn-danger:hover { background: rgba(255,101,132,0.25); }

    /* Add book form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .add-form h2 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group input, .form-group select {
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }

    .form-group select option { background: var(--surface); color: var(--text); }

    /* Books table */
    .books-section {
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }

    .books-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
    }

    .book-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .book-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .book-info { flex: 1; min-width: 0; }

    .book-title {
      font-weight: 500;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .book-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .badge-available {
      background: rgba(67, 233, 123, 0.1);
      color: var(--green);
      border: 1px solid rgba(67,233,123,0.2);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--accent2); color: var(--accent2); }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: var(--muted);
    }

    .footer span { color: var(--accent); font-weight: 500; }

    /* Mobile */
    @media (max-width: 600px) {
      body { padding: 16px 12px; }

      .header h1 { font-size: 26px; }
      .header p  { font-size: 13px; }

      .stats { flex-direction: row; gap: 8px; }
      .stat-card { padding: 12px 8px; }
      .stat-card .num { font-size: 22px; }
      .stat-card .label { font-size: 10px; }

      .search-row { flex-direction: column; gap: 8px; }
      .search-row input { width: 100%; }
      .search-row .btn { width: 100%; }

      .add-form { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; gap: 10px; }

      .book-card {
        padding: 12px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .book-title { font-size: 14px; }
      .book-meta  { font-size: 11px; }

      .book-badge { font-size: 10px; }

      .btn-danger { padding: 6px 10px; font-size: 11px; }

      .toast {
        bottom: 12px;
        right: 12px;
        left: 12px;
        text-align: center;
      }

      .footer { font-size: 10px; margin-top: 20px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>📚 Library Management</h1>
    <p>Manage your book collection easily</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="totalBooks">0</div>
      <div class="label">Total Books</div>
    </div>
    <div class="stat-card">
      <div class="num" id="availableBooks">0</div>
      <div class="label">Available</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍  Search by title or author..." oninput="searchBooks()"/>
    <button class="btn btn-primary" onclick="loadBooks()">All Books</button>
  </div>

  <!-- CSV Upload -->
  <div class="add-form" style="margin-bottom: 16px;">
    <h2>📂 Bulk Upload via CSV</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">Upload a CSV file with columns: <strong>title, author, genre, year</strong></p>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <input type="file" id="csvFile" accept=".csv" style="flex:1; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text); cursor:pointer;"/>
      <button class="btn btn-primary" onclick="uploadCSV()">Upload CSV</button>
      <button class="btn" style="background:var(--card); border:1px solid var(--border); color:var(--accent);" onclick="downloadSample()">Download Sample</button>
    </div>
    <div id="csvStatus" style="margin-top:10px; font-size:13px; color:var(--muted);"></div>
  </div>

  <!-- Add Book Form -->
  <div class="add-form">
    <h2>➕ Add New Book</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Book Title</label>
        <input type="text" id="title" placeholder="e.g. The Great Gatsby"/>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="author" placeholder="e.g. F. Scott Fitzgerald"/>
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select id="genre">
          <option value="">Select genre</option>
          <option>Fiction</option>
          <option>Non-Fiction</option>
          <option>Science</option>
          <option>Technology</option>
          <option>History</option>
          <option>Biography</option>
          <option>Mystery</option>
          <option>Romance</option>
          <option>Fantasy</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year Published</label>
        <input type="number" id="year" placeholder="e.g. 2023" min="1000" max="2099"/>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addBook()">Add Book</button>
  </div>

  <!-- Books list -->
  <div class="books-section">
    <div class="section-header">
      <h2>All Books</h2>
    </div>
    <div class="books-grid" id="booksGrid">
      <div class="empty">
        <div class="emoji">📖</div>
        <p>Loading books...</p>
      </div>
    </div>
  </div>

  <div class="footer">
    Created by <span>Kezia Thomas</span> · Powered by <span>Spring Boot + MySQL</span>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api/books';

  // ── Load all books ──────────────────────────────────────
  async function loadBooks() {
    document.getElementById('searchInput').value = '';
    try {
      const res   = await fetch(API);
      const books = await res.json();
      renderBooks(books);
      updateStats(books);
    } catch {
      showToast('Could not connect to server', 'error');
    }
  }

  // ── Search books ────────────────────────────────────────
  async function searchBooks() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) { loadBooks(); return; }
    try {
      const res   = await fetch(`${API}/search?query=${encodeURIComponent(query)}`);
      const books = await res.json();
      renderBooks(books);
    } catch {
      showToast('Search failed', 'error');
    }
  }

  // ── Add book ────────────────────────────────────────────
  async function addBook() {
    const title  = document.getElementById('title').value.trim();
    const author = document.getElementById('author').value.trim();
    const genre  = document.getElementById('genre').value;
    const year   = parseInt(document.getElementById('year').value);

    if (!title || !author || !genre || !year) {
      showToast('Please fill in all fields', 'error');
      return;
    }

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author, genre, year, available: true })
      });

      if (res.ok) {
        // Clear form
        document.getElementById('title').value  = '';
        document.getElementById('author').value = '';
        document.getElementById('genre').value  = '';
        document.getElementById('year').value   = '';
        showToast('✅ Book added successfully!', 'success');
        loadBooks();
      } else {
        showToast('Failed to add book', 'error');
      }
    } catch {
      showToast('Could not connect to server', 'error');
    }
  }

  // ── Delete book ─────────────────────────────────────────
  async function deleteBook(id) {
    if (!confirm('Are you sure you want to delete this book?')) return;
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('🗑️ Book deleted', 'success');
        loadBooks();
      } else {
        showToast('Failed to delete book', 'error');
      }
    } catch {
      showToast('Could not connect to server', 'error');
    }
  }

  // ── Render books ────────────────────────────────────────
  function renderBooks(books) {
    const grid = document.getElementById('booksGrid');
    if (books.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="emoji">📭</div>
          <p>No books found</p>
        </div>`;
      return;
    }

    grid.innerHTML = books.map(book => `
      <div class="book-card">
        <div class="book-icon">📗</div>
        <div class="book-info">
          <div class="book-title">${book.title}</div>
          <div class="book-meta">${book.author} · ${book.genre} · ${book.year}</div>
        </div>
        <span class="book-badge badge-available">Available</span>
        <button class="btn btn-danger" onclick="deleteBook(${book.id})">Delete</button>
      </div>
    `).join('');
  }

  // ── Update stats ────────────────────────────────────────
  function updateStats(books) {
    document.getElementById('totalBooks').textContent     = books.length;
    document.getElementById('availableBooks').textContent = books.filter(b => b.available).length;
  }

  // ── Toast notification ──────────────────────────────────
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className   = `toast ${type} show`;
    setTimeout(() => toast.className = 'toast', 3000);
  }

  // ── CSV Upload ──────────────────────────────────────────
  async function uploadCSV() {
    const file = document.getElementById('csvFile').files[0];
    const status = document.getElementById('csvStatus');

    if (!file) {
      status.textContent = '⚠️ Please select a CSV file first';
      status.style.color = 'var(--accent2)';
      return;
    }

    const text = await file.text();
    const lines = text.trim().split('\n');
    const headers = lines[0].toLowerCase().split(',').map(h => h.trim());

    // Validate headers
    const required = ['title', 'author', 'genre', 'year'];
    const missing = required.filter(r => !headers.includes(r));
    if (missing.length > 0) {
      status.textContent = `⚠️ Missing columns: ${missing.join(', ')}`;
      status.style.color = 'var(--accent2)';
      return;
    }

    // Parse rows
    const books = [];
    for (let i = 1; i < lines.length; i++) {
      const values = lines[i].split(',').map(v => v.trim());
      if (values.length < 4) continue;
      books.push({
        title:  values[headers.indexOf('title')],
        author: values[headers.indexOf('author')],
        genre:  values[headers.indexOf('genre')],
        year:   parseInt(values[headers.indexOf('year')]),
        available: true
      });
    }

    if (books.length === 0) {
      status.textContent = '⚠️ No valid books found in CSV';
      status.style.color = 'var(--accent2)';
      return;
    }

    status.textContent = `⏳ Uploading ${books.length} books...`;
    status.style.color = 'var(--muted)';

    try {
      const res = await fetch('/api/books/bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(books)
      });

      if (res.ok) {
        status.textContent = `✅ Successfully added ${books.length} books!`;
        status.style.color = 'var(--green)';
        document.getElementById('csvFile').value = '';
        loadBooks();
      } else {
        status.textContent = '❌ Upload failed. Try again.';
        status.style.color = 'var(--accent2)';
      }
    } catch {
      status.textContent = '❌ Could not connect to server';
      status.style.color = 'var(--accent2)';
    }
  }

  // ── Download sample CSV ─────────────────────────────────
  function downloadSample() {
    const csv = `title,author,genre,year
The Great Gatsby,F. Scott Fitzgerald,Fiction,1925
To Kill a Mockingbird,Harper Lee,Fiction,1960
1984,George Orwell,Fiction,1949
A Brief History of Time,Stephen Hawking,Science,1988
Clean Code,Robert C. Martin,Technology,2008`;

    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'sample-books.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Load on start
  loadBooks();
</script>
</body>
</html>
